<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎟️ Billets envoyés — Théâtre Saint-Martin</title>
  <style>
    :root {
      --blue: #0d47a1;
      --blue2: #1565c0;
      --purple: #6a1b9a;
      --green: #2e7d32;
      --red: #c62828;
      --bg: #eef6fc;
      --card: #ffffff;
      --text: #212121;
      --muted: #666;
      --border: #dbe7f0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #e3f2fd 0%, #fafafa 100%);
      color: var(--text);
      padding: 12px;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    header,
    .tools,
    .card,
    .locked {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 3px 12px rgba(0,0,0,.10);
    }

    header {
      padding: 16px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 6px;
      color: var(--blue);
      font-size: 1.5rem;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-weight: 650;
      line-height: 1.35;
      font-size: .98rem;
    }

    .tools {
      padding: 12px;
      margin-bottom: 12px;
      display: grid;
      gap: 10px;
    }

    input[type="search"] {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      background: white;
    }

    input[type="search"]:focus {
      border-color: #64b5f6;
      box-shadow: 0 0 0 3px rgba(100,181,246,.22);
    }

    .tool-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .counter {
      color: var(--blue);
      font-weight: 900;
    }

    .refresh {
      background: #455a64;
      color: white;
      border: 0;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .card {
      padding: 14px;
      border-left: 6px solid var(--blue2);
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .name {
      font-size: 1.05rem;
      font-weight: 950;
      line-height: 1.25;
      color: #111;
      word-break: break-word;
    }

    .seats {
      color: var(--muted);
      font-size: .9rem;
      font-weight: 650;
      margin-top: 3px;
    }

    .badge {
      flex: 0 0 auto;
      background: #e8f5e9;
      color: var(--green);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: .78rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .btn,
    .btn-disabled {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 0;
      border-radius: 11px;
      padding: 11px 10px;
      min-height: 42px;
      text-decoration: none;
      font-weight: 900;
      font-size: .95rem;
      line-height: 1.15;
      text-align: center;
      cursor: pointer;
    }

    .btn-view { background: var(--blue2); color: white; }
    .btn-sms { background: var(--purple); color: white; }
    .btn-disabled { background: #e0e0e0; color: #777; cursor: not-allowed; }

    .sms-row {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--red);
      font-weight: 850;
      line-height: 1.3;
    }

    .sms-row.sent { color: var(--green); }
    .sms-row input { transform: scale(1.25); cursor: pointer; }

    .empty,
    .loading,
    .locked {
      text-align: center;
      padding: 24px 16px;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.45;
    }

    @media (max-width: 480px) {
      body { padding: 8px; }
      h1 { font-size: 1.35rem; }
      header, .tools, .card { border-radius: 14px; }
      .top { display: block; }
      .badge { display: inline-block; margin-top: 8px; }
      .actions { grid-template-columns: 1fr; }
      .btn, .btn-disabled { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>🎟️ Billets envoyés</h1>
      <p class="subtitle">Uniquement les réservations payées / billets disponibles. Recherche, visualisation et renvoi SMS.</p>
    </header>

    <section id="locked" class="locked" style="display:none;">
      🔒 Accès admin refusé.<br>Recharge la page pour réessayer.
    </section>

    <main id="adminArea" style="display:none;">
      <section class="tools">
        <input id="searchInput" type="search" placeholder="🔎 Rechercher un nom…" autocomplete="off" />
        <div class="tool-line">
          <div id="counter" class="counter">0 billet</div>
          <button id="refreshBtn" class="refresh" type="button">🔄 Actualiser</button>
        </div>
      </section>

      <section id="ticketsList" class="list">
        <div class="loading">Chargement des billets…</div>
      </section>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyXXXX_TON_API_KEY",
      authDomain: "theatre-saint-martin.firebaseapp.com",
      databaseURL: "https://theatre-saint-martin-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "theatre-saint-martin",
      storageBucket: "theatre-saint-martin.appspot.com",
      messagingSenderId: "1234567890",
      appId: "1:1234567890:web:abcd1234efgh"
    };

    const ADMIN_PASSWORD = "admin123";
    const SITE_BASE_URL = "https://troupe-saint-martin.github.io/theatre-saint-martin/";
    const PUBLIC_REQUESTS_PATH = "spectacles/amies_2026_10_11/public_requests";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const adminArea = document.getElementById("adminArea");
    const locked = document.getElementById("locked");
    const ticketsList = document.getElementById("ticketsList");
    const searchInput = document.getElementById("searchInput");
    const counter = document.getElementById("counter");
    const refreshBtn = document.getElementById("refreshBtn");

    let seats = {};
    let publicRequests = {};
    let groupedReservations = [];

    function escapeHTML(value) {
      return String(value ?? "").replace(/[&<>'"]/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        "\"": "&quot;"
      }[char]));
    }

    function normalize(value) {
      return String(value || "").trim().toLowerCase();
    }

    function cleanSmsPhone(phone) {
      return String(phone || "").replace(/[^\d+]/g, "");
    }

    function sortSeatIds(a, b) {
      return String(a).localeCompare(String(b), "fr", { numeric: true });
    }

    function buildTicketPageUrl(user = {}) {
      const id = String(user.reservationId || "").trim();
      if (!id) return "";
      return SITE_BASE_URL + "b.html?r=" + encodeURIComponent(id);
    }

    function getTicketSmsMessage(user = {}) {
      const ticketLink = buildTicketPageUrl(user);

      return "Bonjour,\n\n"
        + "✅ Bonne nouvelle : votre règlement a bien été reçu.\n\n"
        + "Vous pouvez dès à présent consulter votre billet avec QR code pour la représentation du 10\u200Boctobre\u200B2026 à 20 h 30 à ISLEA en cliquant sur le lien ci-dessous 👇 :\n\n"
        + ticketLink + "\n\n"
        + "Ce billet vous est également envoyé par email avec votre QR code.\n\n"
        + "Le jour J, pensez à présenter votre billet à l’entrée, histoire de ne pas jouer une scène d’improvisation dès l’accueil. 😉\n\n"
        + "ℹ️ SMS automatique — pour toute question, contactez-nous au 06 46 32 06 49.\n\n"
        + "Merci pour votre soutien à la Troupe Saint-Martin. ❤️";
    }

    function buildTicketSmsHref(phone, user = {}) {
      const cleanPhone = cleanSmsPhone(phone);
      return "sms:" + cleanPhone + "?body=" + encodeURIComponent(getTicketSmsMessage(user));
    }

    function groupSeatsByReservation(seatsData = {}) {
      const grouped = {};

      Object.entries(seatsData).forEach(([seatId, data]) => {
        if (!data) return;

        const reservationId = data.reservationId || "";
        const key = reservationId || `${normalize(data.email)}__${normalize(data.name)}__${normalize(data.phone)}`;
        if (!key || key === "____") return;

        if (!grouped[key]) {
          const publicRequest = reservationId ? (publicRequests[reservationId] || {}) : {};
          grouped[key] = {
            key,
            reservationId,
            name: data.name || "Inconnu",
            email: data.email || "",
            phone: data.phone || "",
            seats: [],
            allPaid: true,
            ticketEmailSentAt: data.ticketEmailSentAt || publicRequest.ticketEmailSentAt || "",
            ticketSmsSentAt: data.ticketSmsSentAt || publicRequest.ticketSmsSentAt || "",
            ticketSmsSentBy: data.ticketSmsSentBy || publicRequest.ticketSmsSentBy || ""
          };
        }

        grouped[key].seats.push(seatId);
        grouped[key].allPaid = grouped[key].allPaid && !!data.paid;

        if (!grouped[key].reservationId && data.reservationId) grouped[key].reservationId = data.reservationId;
        if (!grouped[key].email && data.email) grouped[key].email = data.email;
        if (!grouped[key].phone && data.phone) grouped[key].phone = data.phone;
        if (!grouped[key].name && data.name) grouped[key].name = data.name;

        if (data.ticketEmailSentAt && (!grouped[key].ticketEmailSentAt || String(data.ticketEmailSentAt) > String(grouped[key].ticketEmailSentAt))) {
          grouped[key].ticketEmailSentAt = data.ticketEmailSentAt;
        }

        if (data.ticketSmsSentAt && (!grouped[key].ticketSmsSentAt || String(data.ticketSmsSentAt) > String(grouped[key].ticketSmsSentAt))) {
          grouped[key].ticketSmsSentAt = data.ticketSmsSentAt;
          grouped[key].ticketSmsSentBy = data.ticketSmsSentBy || grouped[key].ticketSmsSentBy || "";
        }
      });

      return Object.values(grouped)
        .map(item => ({ ...item, seats: item.seats.sort(sortSeatIds) }))
        .filter(item => {
          // On affiche seulement les billets réellement disponibles :
          // soit un email billet a été enregistré, soit la réservation est payée,
          // soit le SMS billet a déjà été marqué comme envoyé.
          return !!item.reservationId && (!!item.ticketEmailSentAt || item.allPaid || !!item.ticketSmsSentAt);
        })
        .sort((a, b) => String(a.name || "").localeCompare(String(b.name || ""), "fr", { sensitivity: "base" }));
    }

    function getFilteredReservations() {
      const q = normalize(searchInput.value);
      if (!q) return groupedReservations;

      return groupedReservations.filter(r => normalize([
        r.name,
        r.email,
        r.phone,
        r.seats.join(" "),
        r.reservationId
      ].join(" ")).includes(q));
    }

    function renderCards() {
      const list = getFilteredReservations();
      counter.textContent = `${list.length} billet${list.length > 1 ? "s" : ""}`;

      if (!list.length) {
        ticketsList.innerHTML = `<div class="empty">Aucun billet envoyé trouvé.</div>`;
        return;
      }

      ticketsList.innerHTML = list.map(r => {
        const user = {
          reservationId: r.reservationId,
          name: r.name,
          email: r.email,
          phone: r.phone
        };

        const ticketUrl = buildTicketPageUrl(user);
        const smsHref = r.phone ? buildTicketSmsHref(r.phone, user) : "";
        const sent = !!r.ticketSmsSentAt;
        const seatLabel = r.seats.length ? `${r.seats.length} place${r.seats.length > 1 ? "s" : ""}` : "Billet";

        return `
          <article class="card">
            <div class="top">
              <div>
                <div class="name">${escapeHTML(r.name || "Inconnu")}</div>
                <div class="seats">${escapeHTML(seatLabel)}</div>
              </div>
              <span class="badge">✅ Billet disponible</span>
            </div>

            <div class="actions">
              ${ticketUrl
                ? `<a class="btn btn-view" href="${escapeHTML(ticketUrl)}" target="_blank" rel="noopener">👁️ Ouvrir billet</a>`
                : `<span class="btn-disabled">👁️ Pas de lien</span>`}
              ${smsHref
                ? `<a class="btn btn-sms" href="${escapeHTML(smsHref)}">📲 Renvoyer SMS</a>`
                : `<span class="btn-disabled">📲 Pas de téléphone</span>`}
            </div>

            <label class="sms-row ${sent ? "sent" : ""}">
              <input
                type="checkbox"
                class="ticket-sms-toggle"
                data-reservation-id="${escapeHTML(r.reservationId || "")}"
                data-name="${escapeHTML(r.name || "")}"
                data-email="${escapeHTML(r.email || "")}"
                ${sent ? "checked" : ""}
              >
              <span>${sent ? "SMS billet envoyé" : "SMS billet non envoyé"}</span>
            </label>
          </article>
        `;
      }).join("");
    }

    async function setTicketSmsStatus({ reservationId = "", clientName = "", clientEmail = "", sent = false } = {}) {
      const now = new Date().toISOString();
      const entries = Object.entries(seats || {}).filter(([_, data]) => {
        if (!data) return false;
        if (reservationId && data.reservationId === reservationId) return true;
        if (clientEmail && normalize(data.email) === normalize(clientEmail)) return true;
        return clientName && normalize(data.name) === normalize(clientName);
      });

      for (const [seatId, data] of entries) {
        await set(ref(db, `seats/${seatId}`), {
          ...data,
          ticketSmsSentAt: sent ? now : "",
          ticketSmsSentBy: sent ? "admin" : "",
          updatedAt: now
        });
      }

      if (reservationId) {
        try {
          const requestRef = ref(db, `${PUBLIC_REQUESTS_PATH}/${reservationId}`);
          const snap = await get(requestRef);
          if (snap.exists()) {
            await set(requestRef, {
              ...snap.val(),
              ticketSmsSentAt: sent ? now : "",
              ticketSmsSentBy: sent ? "admin" : "",
              updatedAt: now
            });
          }
        } catch (err) {
          console.warn("Synchronisation public_requests impossible", err);
        }
      }
    }

    function rebuild() {
      groupedReservations = groupSeatsByReservation(seats);
      renderCards();
    }

    function loadData() {
      ticketsList.innerHTML = `<div class="loading">Chargement des billets…</div>`;

      onValue(ref(db, PUBLIC_REQUESTS_PATH), snapshot => {
        publicRequests = snapshot.val() || {};
        rebuild();
      });

      onValue(ref(db, "seats"), snapshot => {
        seats = snapshot.val() || {};
        rebuild();
      });
    }

    function unlockAdmin() {
      const alreadyUnlocked = sessionStorage.getItem("billetsAdminUnlocked") === "true";
      const password = alreadyUnlocked ? ADMIN_PASSWORD : prompt("Mot de passe admin :");

      if (password === ADMIN_PASSWORD) {
        sessionStorage.setItem("billetsAdminUnlocked", "true");
        adminArea.style.display = "block";
        locked.style.display = "none";
        loadData();
      } else {
        adminArea.style.display = "none";
        locked.style.display = "block";
      }
    }

    searchInput.addEventListener("input", renderCards);
    refreshBtn.addEventListener("click", rebuild);

    document.addEventListener("change", async (e) => {
      const checkbox = e.target.closest(".ticket-sms-toggle");
      if (!checkbox) return;

      const reservationId = checkbox.dataset.reservationId || "";
      const clientName = checkbox.dataset.name || "";
      const clientEmail = checkbox.dataset.email || "";
      const sent = checkbox.checked;

      checkbox.disabled = true;
      try {
        await setTicketSmsStatus({ reservationId, clientName, clientEmail, sent });
      } catch (err) {
        console.error("Erreur mise à jour SMS billet", err);
        checkbox.checked = !sent;
        alert("❌ Impossible de modifier le statut SMS billet.");
      } finally {
        checkbox.disabled = false;
      }
    });

    unlockAdmin();
  </script>
</body>
</html>
